<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pax Romana - Simulador de Conquista</title>
    <style>
        /* ====================================
           ESTILOS (CSS)
           ==================================== */
        :root {
            --cor-fundo: #f4f4e8;
            --cor-borda: #333;
            --cor-roma: #d90000;
            --cor-nao-conquistada: #e8d0a8;
            --cor-painel: #3a3a3a;
            --cor-texto-painel: #ffffff;
            --cor-log: #1c1c1c;
        }

        body {
            font-family: 'Georgia', serif;
            margin: 0;
            background-color: var(--cor-fundo);
            color: var(--cor-borda);
            display: flex;
            min-height: 100vh;
            flex-direction: column; 
        }

       /* ====================================
   ESTILOS (CSS) - BLOCO DE CORREÇÃO
   ==================================== */

/* ... (Mantenha o CSS do BODY) ... */

/* Layout principal para Desktop */
@media (min-width: 1024px) {
    body {
        flex-direction: row; 
    }
    #game-panel {
        width: 350px; 
        max-height: 100vh;
        overflow-y: auto;
    }
    #map-container {
        flex-grow: 1;
        /* REMOVEMOS A ALTURA FIXA AQUI, DEIXANDO-O RESPONSIVO */
        /* max-width: calc(100% - 350px); <-- Pode ser mantido ou removido */
        height: 100vh; /* FORÇA O CONTAINER A OCUPAR A ALTURA DA TELA */
        display: flex; 
        justify-content: center;
        align-items: center;
        overflow: hidden; /* Mantém o scroll no contêiner de fora, se necessário */
    }
    #roman-map {
        /* CORREÇÃO CRÍTICA: Permite que o mapa seja maior que o contêiner */
        max-width: 100%;
        max-height: 100%; /* Ajustado para 100% da altura do contêiner */
        min-width: 600px;
        /* ADICIONA SCROLL se o mapa for maior que o viewport do container */
        /* REMOVA O overflow:hidden do #map-container se você quer scroll dentro dele */
    }
}

/* Container do Mapa SVG (para rolagem e responsividade) */
#map-container {
    width: 100%;
    /* CORREÇÃO: ADICIONA SCROLL NO CONTAINER DE FORA */
    overflow: auto; 
    padding: 10px;
    box-sizing: border-box;
    background-color: #f0f0f0;
    /* REMOVA height: 100vh; no layout mobile se não quiser forçar a altura */
}

#roman-map {
    /* CORREÇÃO CRÍTICA: Garante que o SVG mantenha a proporção e seja renderizado */
    width: 100%; 
    height: auto; /* IMPORTANTE: Deixa a altura se auto-ajustar à largura */
    min-width: 1000px; /* GARANTE QUE HAJA ESPAÇO. Aumentei este valor para evitar a distorção inicial */
    min-height: 600px; /* Para garantir visibilidade em telas pequenas */
    border: 2px solid var(--cor-borda);
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}


        /* Estilo para as prov?ncias - IMPORTANTE: O SEU SVG DEVE USAR ESTA CLASSE */
        .province {
            fill: var(--cor-nao-conquistada);
            stroke: var(--cor-borda);
            stroke-width: 1.5;
            transition: fill 0.3s, stroke-width 0.1s;
            cursor: pointer;
        }

        .conquered {
            fill: var(--cor-roma) !important;
            cursor: default;
        }

        .province:hover:not(.conquered) {
            stroke-width: 3;
            stroke: #ff9900;
        }
        
        .selected-target {
            stroke: #00ff00 !important;
            stroke-width: 4 !important;
        }

        /* Painel de Jogo Lateral */
        #game-panel {
            background-color: var(--cor-painel);
            color: var(--cor-texto-painel);
            padding: 15px;
            box-sizing: border-box;
            border-left: 2px solid var(--cor-borda);
        }

        h2, h3 {
            border-bottom: 1px solid var(--cor-texto-painel);
            padding-bottom: 5px;
        }

        #provinces-status-list {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #555;
            padding: 5px;
        }

        #provinces-status-list li {
            padding: 5px 0;
            border-bottom: 1px dotted #555;
            display: flex;
            justify-content: space-between;
            cursor: pointer; /* Indica que a lista pode ser usada para selecionar */
        }
        
        #provinces-status-list li:hover {
            background-color: #4c4c4c;
        }
        
        .legions-count {
            font-weight: bold;
            color: yellow;
        }

        #battle-info strong {
            color: #ffcc00;
        }

        .control-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            font-size: 1.1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        
        #attack-btn { background-color: var(--cor-roma); color: var(--cor-texto-painel); }
        #end-turn-btn { background-color: #2a6134; color: var(--cor-texto-painel); }

        #action-log {
            margin-top: 20px;
            padding: 10px;
            background-color: var(--cor-log);
            color: #ccc;
            height: 150px;
            overflow-y: auto;
            font-size: 0.85em;
            white-space: pre-wrap;
            border-radius: 5px;
        }
        
        .dice-roll-animation {
            font-size: 1.2em;
            font-weight: bold;
            color: #ccff00;
            margin-top: 10px;
            text-align: center;
        }

        .dice-roll-animation span {
            display: inline-block;
            margin: 0 5px;
            padding: 5px 8px;
            border: 2px solid #fff;
            background-color: #333;
            border-radius: 5px;
            animation: roll 0.5s ease-in-out infinite alternate;
        }

        @keyframes roll {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-5px); opacity: 0.7; }
        }
    </style>
</head>

    <div id="game-panel">
        <h1>Pax Romana</h1>
        <p>Legi?es de Roma: <span id="rome-legions" class="legions-count">33</span></p>

        <h3 id="panel-status-title">Status das Prov?ncias (Alvos)</h3>
        <ul id="provinces-status-list">
            </ul>
        
        <h3>Ataque Atual</h3>
        <div id="battle-info">
            <p>Origem: <strong>Roma (<span id="current-rome-legions">33</span>)</strong></p>
            <p>Alvo: <strong id="target-province">Nenhum</strong></p>
            <p>Legi?es Alvo: <strong id="target-legions">--</strong></p>
        </div>
        
        <div id="dice-animation" class="dice-roll-animation" style="display:none;">

        <h3>Resultado da Batalha</h3>
        <p id="battle-result-text">Selecione uma prov?ncia no mapa ou na lista para atacar.</p>

        <button id="attack-btn" class="control-btn" disabled>ATACAR PROV?NCIA</button>
        <button id="end-turn-btn" class="control-btn" disabled>FIM DO TURNO</button>
        
        <h3>Log de A??es</h3>
        <pre id="action-log">In?cio do Jogo:</pre>
    </div>
<script>
    /* ====================================
       CONFIGURA??ES E ESTADO DO JOGO (JAVASCRIPT)
       ==================================== */

    // ----------------------------------------------------
    // 1. Mapa de Adjac?ncia (Vizinhos)
    //    *** ATEN??O: As chaves devem ser as IDs EXATAS do seu SVG. ***
    // ----------------------------------------------------
    const ADJACENCY_MAP = {
        // PONTO DE PARTIDA (Roma): Define quais prov?ncias S?O ATAC?VEIS no Turno 1
        "ITALIA_START": ["GALIA", "DALMATIA", "AFRICA", "CYRENAICA"], 
        
        // Mapa de adjac?ncias entre as 20 prov?ncias
        "CYPRUS": ["SYRIA", "ASIA"], 
        "BRITANNIA": ["AQUITANIA"], 
        "ESPANHA": ["PORTUGAL", "AQUITANIA", "MAURITANIA"], 
        "PORTUGAL": ["ESPANHA", "MAURITANIA"],
        "AQUITANIA": ["BRITANNIA", "ESPANHA", "GALIA"],
        "GALIA": ["AQUITANIA", "BELGICA", "DALMATIA", "ITALIA_START"],
        "BELGICA": ["GALIA"],
        "DALMATIA": ["GALIA", "TRACIA", "MACEDONIA", "ITALIA_START"],
        "DACIA": ["TRACIA", "MACEDONIA"],
        "TRACIA": ["DALMATIA", "MACEDONIA", "ASIA", "DACIA"],
        "MACEDONIA": ["DALMATIA", "TRACIA", "ASIA", "CAPADOCIA"],
        "MAURITANIA": ["ARGELIA", "ESPANHA", "PORTUGAL"],
        "ARGELIA": ["MAURITANIA", "AFRICA"],
        "AFRICA": ["ARGELIA", "CYRENAICA", "ITALIA_START"],
        "ASIA": ["CYPRUS", "SYRIA", "MACEDONIA", "TRACIA", "CAPADOCIA"],
        "SYRIA": ["CYPRUS", "ASIA", "JUDEIA", "CAPADOCIA"],
        "JUDEIA": ["SYRIA", "EGITO"],
        "EGITO": ["JUDEIA", "CYRENAICA"],
        "CAPADOCIA": ["MACEDONIA", "SYRIA", "ASIA"],
        "CYRENAICA": ["AFRICA", "EGITO", "ITALIA_START"],
    };

    const gameState = {
        romeLegions: 33, // Voltando para o valor inicial de 33
        selectedTargetId: null,
        currentTurn: 1,
        provinces: {},
        provincesTotal: 20, // Assumindo 20 IDs no mapa
        conqueredProvinces: 0,
        diceAnimationTimeout: null,
        // Lista dos 20 IDs e nomes para garantir a correspond?ncia
        initialProvinces: [
            { id: "CYPRUS", name: "Chipre" },
            { id: "BRITANNIA", name: "Brit?nia" },
            { id: "ESPANHA", name: "Hisp?nia" },
            { id: "PORTUGAL", name: "Lusit?nia" },
            { id: "AQUITANIA", name: "Aquit?nia" },
            { id: "GALIA", name: "G?lia" },
            { id: "BELGICA", name: "B?lgica" },
            { id: "DALMATIA", name: "Dalm?cia" },
            { id: "DACIA", name: "D?cia" },
            { id: "TRACIA", name: "Tr?cia" },
            { id: "MACEDONIA", name: "Maced?nia" },
            { id: "MAURITANIA", name: "Maurit?nia" },
            { id: "ARGELIA", name: "Num?dia" },
            { id: "AFRICA", name: "?frica" },
            { id: "ASIA", name: "?sia" },
            { id: "SYRIA", name: "S?ria" },
            { id: "JUDEIA", name: "Judeia" },
            { id: "EGITO", name: "Egito" },
            { id: "CAPADOCIA", name: "Capad?cia" },
            { id: "CYRENAICA", name: "Cirenaica" },
        ],
    };
    
    // Simula a ITALIA como uma prov?ncia 'conquistada' para iniciar as fronteiras
    const ROME_PROVINCE_ID = "ITALIA_START"; 
    const MIN_DEFENSE_LEGIONS = 1;
    const MAX_DEFENSE_LEGIONS = 7;
    const ROME_COLOR = 'var(--cor-roma)';


    // ====================================
    // FUN??ES DE UTILIDADE E L?GICA DO JOGO
    // ====================================

    function rollDice(numDice) {
        const rolls = [];
        for (let i = 0; i < numDice; i++) {
            rolls.push(Math.floor(Math.random() * 6) + 1);
        }
        return rolls.sort((a, b) => b - a);
    }
    
    function logAction(message) {
        const log = document.getElementById('action-log');
        const now = new Date();
        const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
        log.innerHTML = `<span style="color:#ffffff;">[${timeString}]</span> ${message}\n` + log.innerHTML;
        log.scrollTop = log.scrollHeight;
    }

    function updateGameDisplay() {
        document.getElementById('rome-legions').textContent = gameState.romeLegions;
        document.getElementById('current-rome-legions').textContent = gameState.romeLegions;
        
        const list = document.getElementById('provinces-status-list');
        list.innerHTML = '';
        
        // Lista todas as prov?ncias
        Object.values(gameState.provinces).sort((a, b) => a.name.localeCompare(b.name)).forEach(province => {
            const li = document.createElement('li');
            li.setAttribute('data-prov-id', province.id);
            li.addEventListener('click', () => selectProvince(province.id));
            
            const statusText = province.conquered ? "CONQUISTADA" : `Legi?es: ${province.legions}`;
            const statusClass = province.conquered ? "conquered-status" : "legions-count";
            const colorStyle = province.conquered ? 'color: var(--cor-roma); font-weight: bold;' : '';

            li.innerHTML = `${province.name}: <span class="${statusClass}" style="${colorStyle}">${statusText}</span>`;
            list.appendChild(li);

            // Atualiza cores no SVG
            if (province.element) {
                if (province.conquered) {
                    province.element.classList.add('conquered');
                    province.element.classList.remove('province');
                } else {
                    province.element.classList.add('province');
                    province.element.classList.remove('conquered');
                }
            }
        });

        checkGameEnd();
    }
    
    function updateBattleInfo(provinceId) {
        const province = provinceId ? gameState.provinces[provinceId] : null;
        
        document.getElementById('target-province').textContent = province ? province.name : 'Nenhum';
        document.getElementById('target-legions').textContent = province ? province.legions : '--';
        
        const canAttack = province && !province.conquered && gameState.romeLegions > 0;
        document.getElementById('attack-btn').disabled = !canAttack;
        document.getElementById('end-turn-btn').disabled = !provinceId; 
    }

    function showDiceRolls(attackerRolls, defenderRolls) {
        const diceDiv = document.getElementById('dice-animation');
        diceDiv.innerHTML = attackerRolls.map(r => `<span>${r}</span>`).join('') + 
                            " vs " + 
                            defenderRolls.map(r => `<span>${r}</span>`).join('');
        diceDiv.style.display = 'block';
        
        clearTimeout(gameState.diceAnimationTimeout);
        gameState.diceAnimationTimeout = setTimeout(() => {
            diceDiv.style.display = 'none';
        }, 1500);
    }
    
    function resolveCombat(targetId) {
        const province = gameState.provinces[targetId];
        const provinceName = province.name;
        const attackerLegions = gameState.romeLegions;
        const defenderLegions = province.legions;
        
        // Ambos os lados rolam 3 dados
        const attackerRolls = rollDice(3);
        const defenderRolls = rollDice(3);

        showDiceRolls(attackerRolls, defenderRolls);

        let romeLosses = 0;
        let provinceLosses = 0;
        const maxComparisons = 3; 
        
        let logDetails = `\n--- Batalha (${provinceName}) ---`;
        logDetails += `\nRoma (${attackerLegions} L.): ${attackerRolls.join(', ')}`;
        logDetails += `\n${provinceName} (${defenderLegions} L.): ${defenderRolls.join(', ')}`;
        
        // Compara os 3 dados, onde o empate favorece a defesa.
        for (let i = 0; i < maxComparisons; i++) {
            const a = attackerRolls[i];
            const d = defenderRolls[i];

            if (a > d) {
                provinceLosses++;
            } else { // Empate (a == d) ou Defesa Vence (a < d)
                romeLosses++;
            }
        }
        
        // Aplica as perdas
        gameState.romeLegions = Math.max(0, gameState.romeLegions - romeLosses);
        province.legions = Math.max(0, province.legions - provinceLosses);

        logDetails += `\nResultado da Rodada: Roma -${romeLosses}, ${provinceName} -${provinceLosses}`;
        logAction(logDetails);

        const resultTextElement = document.getElementById('battle-result-text');
        resultTextElement.innerHTML = `Roma: <span style="color:red;">-${romeLosses}</span> Legi?o(?es). ${provinceName}: <span style="color:red;">-${provinceLosses}</span> Legi?o(?es).<br>Continue o ataque...`;

        updateGameDisplay();
        updateBattleInfo(targetId); // Atualiza info de legi?es restantes
        checkConquest(targetId);
    }

    function checkConquest(provinceId) {
        const province = gameState.provinces[provinceId];
        if (province.legions <= 0 && !province.conquered) {
            province.conquered = true;
            gameState.conqueredProvinces++;
            
            // Refor?o de 1 Legi?o pela conquista
            gameState.romeLegions += 1; 

            logAction(`VIT?RIA! ${province.name} foi CONQUISTADA e anexada ao Imp?rio. Roma recebeu 1 Legi?o de refor?o.`);
            
            // Limpar sele??o
            if (province.element) province.element.classList.remove('selected-target');
            gameState.selectedTargetId = null;
            updateBattleInfo(null);
            
            updateGameDisplay();
            checkGameEnd();
        }
    }
    
    function checkGameEnd() {
        if (gameState.conqueredProvinces === gameState.provincesTotal) {
            logAction(`VIT?RIA! Toda a Europa Romana est? sob o dom?nio de Roma!`);
            document.getElementById('attack-btn').disabled = true;
            document.getElementById('end-turn-btn').disabled = true;
            document.getElementById('battle-result-text').textContent = 'FIM DE JOGO: PAX ROMANA!';
        } else if (gameState.romeLegions <= 0) {
            logAction(`DERROTA! Roma ficou sem legi?es. O Imp?rio caiu no turno ${gameState.currentTurn}.`);
            document.getElementById('attack-btn').disabled = true;
            document.getElementById('end-turn-btn').disabled = true;
            document.getElementById('battle-result-text').textContent = 'FIM DE JOGO: O IMP?RIO CAIU!';
        }
    }
    
    function endTurn() {
        if (gameState.selectedTargetId && gameState.provinces[gameState.selectedTargetId].element) {
            gameState.provinces[gameState.selectedTargetId].element.classList.remove('selected-target');
        }
        
        const reinforcement = 1 + Math.floor(gameState.conqueredProvinces / 4);
        gameState.romeLegions += reinforcement;
        logAction(`\n*** FIM DO TURNO ***\nRoma recebeu ${reinforcement} legi?o(?es) de refor?o.`);

        gameState.currentTurn++;
        gameState.selectedTargetId = null;
        
        document.getElementById('battle-result-text').textContent = "Novo turno! Selecione uma prov?ncia vizinha para atacar.";
        document.getElementById('end-turn-btn').disabled = true;
        
        updateGameDisplay();
        updateBattleInfo(null);
    }

    // ----------------------------------------------------
    // L?gica da Adjac?ncia (Regra de Vizinhan?a)
    // ----------------------------------------------------
    
    function isAttackable(targetId) {
        if (gameState.provinces[targetId].conquered) {
            return false;
        }
        
        const conqueredIds = Object.keys(gameState.provinces).filter(id => gameState.provinces[id].conquered);
        
        // Adiciona o ID de partida de Roma ? lista de "conquistados" (para o 1? turno)
        conqueredIds.push(ROME_PROVINCE_ID); 
        
        // Verifica se o alvo ? vizinho de QUALQUER prov?ncia controlada por Roma
        for (const conqueredId of conqueredIds) {
            const neighbors = ADJACENCY_MAP[conqueredId] || []; 
            if (neighbors.includes(targetId)) {
                return true;
            }
        }
        
        return false;
    }
    

    // ====================================
    // CONTROLES DE INTERFACE
    // ====================================

    function initializeGame() {
        const svg = document.getElementById('roman-map');
        if (!svg) {
            logAction("Erro: O mapa SVG n?o foi encontrado no HTML.");
            return;
        }
        
        // 1. Inicializa o estado das prov?ncias
        let foundCount = 0;
        gameState.initialProvinces.forEach(p => {
            // Tenta encontrar o path pelo ID exato
            const element = svg.getElementById(p.id);
            
            // --------------------------------------------------
            // *** PONTO DE VERIFICA??O CR?TICO ***
            // Se o elemento n?o for encontrado, ele n?o ser? clic?vel!
            // --------------------------------------------------
            if (element) {
                p.element = element;
                p.legions = Math.floor(Math.random() * (MAX_DEFENSE_LEGIONS - MIN_DEFENSE_LEGIONS + 1)) + MIN_DEFENSE_LEGIONS;
                p.conquered = false;
                
                // Anexa o evento de clique ao elemento SVG
                element.addEventListener('click', () => selectProvince(p.id));
                foundCount++;
            } else {
                logAction(`ALERTA: O ID "${p.id}" n?o foi encontrado no seu c?digo SVG. Esta prov?ncia n?o ser? clic?vel.`);
            }
            gameState.provinces[p.id] = p;
        });
        
        if (foundCount !== gameState.provincesTotal) {
            logAction(`ATEN??O: Apenas ${foundCount} de ${gameState.provincesTotal} prov?ncias foram carregadas. Verifique se os IDs do SVG e do script correspondem.`);
        }

        // 2. Configura bot?es
        document.getElementById('attack-btn').addEventListener('click', handleAttackClick);
        document.getElementById('end-turn-btn').addEventListener('click', endTurn);
        
        logAction(`O Imp?rio Romano inicia sua expans?o com ${gameState.romeLegions} legi?es.`);
        updateGameDisplay();
    }

    // 2. Gerencia o clique em uma prov?ncia
    function selectProvince(provinceId) {
        const province = gameState.provinces[provinceId];
        
        if (!province || province.conquered || gameState.romeLegions <= 0) {
            if (province && province.conquered) logAction(`${province.name} j? foi conquistada!`);
            return;
        }

        // <<<< VERIFICA??O DE ADJAC?NCIA >>>>
        if (!isAttackable(provinceId)) {
            logAction(`${province.name} n?o ? adjacente a uma prov?ncia romana. Escolha um alvo fronteiri?o.`);
            return;
        }
        // <<<< FIM DA VERIFICA??O >>>>

        // Remove a classe de sele??o da prov?ncia anterior
        if (gameState.selectedTargetId && gameState.provinces[gameState.selectedTargetId].element) {
            gameState.provinces[gameState.selectedTargetId].element.classList.remove('selected-target');
        }

        // Define o novo alvo e aplica a classe de sele??o
        gameState.selectedTargetId = provinceId;
        province.element.classList.add('selected-target');
        
        updateBattleInfo(provinceId);
        document.getElementById('end-turn-btn').disabled = false;
        document.getElementById('battle-result-text').textContent = `Alvo selecionado: ${province.name}. Inicie o ataque!`;
    }

    // Inicia o jogo quando o DOM estiver completamente carregado
    document.addEventListener('DOMContentLoaded', initializeGame);
</script>
