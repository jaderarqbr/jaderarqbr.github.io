<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SapataCalc - NBR 6118 / 6122</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; padding: 15px; }
        .container { max-width: 650px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; border-bottom: 3px solid #27ae60; padding-bottom: 10px; }
        h3 { color: #16a085; font-size: 1.1em; margin-top: 20px; border-left: 4px solid #27ae60; padding-left: 10px; }
        .row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 10px; }
        .col { flex: 1; min-width: 140px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 13px; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; background: #fafafa; }
        .btn { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; color: white; transition: 0.2s; }
        .btn-calc { background-color: #27ae60; }
        .btn-pdf { background-color: #2c3e50; margin-top: 10px; }
        #relatorio { margin-top: 25px; padding: 20px; background: #e8f6ef; border: 1px solid #c2e5d3; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dimensionamento de Sapata Isolada</h2>

    <h3>Solo e Materiais</h3>
    <div class="row">
        <div class="col"><label>Tensão Solo (kgf/cm²)</label><input type="number" id="tensaoSolo" step="0.1" value="1.5"></div>
        <div class="col"><label>Aço</label><input type="text" value="CA-50" readonly></div>
    </div>

    <h3>Cargas Acumuladas</h3>
    <div class="row">
        <div class="col"><label>Peso da Laje (kgf)</label><input type="number" id="pLaje" placeholder="Ex: 4000"></div>
        <div class="col"><label>Peso da Viga (kgf)</label><input type="number" id="pViga" placeholder="Ex: 560"></div>
        <div class="col"><label>Peso do Pilar (kgf)</label><input type="number" id="pPilar" placeholder="Ex: 300"></div>
    </div>

    <h3>Solicitações no Topo da Sapata</h3>
    <div class="row">
        <div class="col"><label>Força Vertical (Tf)</label><input type="number" id="forcaTf" step="0.1" placeholder="Ex: 5.0"></div>
        <div class="col"><label>Momento X (kgf.m)</label><input type="number" id="momX" value="0"></div>
        <div class="col"><label>Momento Y (kgf.m)</label><input type="number" id="momY" value="0"></div>
    </div>

    <button class="btn btn-calc" onclick="calcularSapata()">CALCULAR DIMENSÕES</button>

    <div id="relatorio">
        <h4>Memória Descritiva Sugerida:</h4>
        <p id="resTexto"></p>
        <button class="btn btn-pdf" onclick="gerarPDFSapata()">GERAR RELATÓRIO FINAL</button>
    </div>
</div>

<script>
    let dadosSapata = {};

    function calcularSapata() {
        // Entradas
        const sigmaSolo = parseFloat(document.getElementById('tensaoSolo').value);
        const pLaje = parseFloat(document.getElementById('pLaje').value || 0);
        const pViga = parseFloat(document.getElementById('pViga').value || 0);
        const pPilar = parseFloat(document.getElementById('pPilar').value || 0);
        const cargaVerticalTf = parseFloat(document.getElementById('forcaTf').value || 0);
        const mx = parseFloat(document.getElementById('momX').value || 0);
        const my = parseFloat(document.getElementById('momY').value || 0);

        // Carga total (Tons para Kgf) + peso próprio estimado da sapata (10%)
        const cargaTotalKgf = ((cargaVerticalTf * 1000) + pLaje + pViga + pPilar) * 1.10;

        // 1. Cálculo da Área da Base (A = P / sigma)
        const areaNecessariaCm2 = cargaTotalKgf / sigmaSolo;
        
        // 2. Dimensões Lados (Lado A e Lado B - supondo sapata quadrada para estudo)
        let lado = Math.ceil(Math.sqrt(areaNecessariaCm2));
        // Ajuste para múltiplos de 5cm
        lado = Math.ceil(lado / 5) * 5; 
        if (lado < 60) lado = 60; // Mínimo de norma

        // 3. Altura Total (H) e Altura da Base (h0)
        // Regra prática: H >= (Lado - pilar_dim)/3
        const hTotal = Math.ceil((lado - 20) / 3); 
        const h0 = Math.max(20, Math.ceil(hTotal / 3)); // Altura da aba (mín 20cm)

        dadosSapata = { sigmaSolo, cargaTotalKgf, lado, hTotal, h0, mx, my, pLaje, pViga, pPilar };

        document.getElementById('relatorio').style.display = "block";
        document.getElementById('resTexto').innerHTML = `
            <b>Carga de Cálculo:</b> ${cargaTotalKgf.toFixed(0)} kgf<br>
            <b>Dimensões da Base:</b> ${lado} x ${lado} cm<br>
            <b>Altura Total (H):</b> ${hTotal} cm<br>
            <b>Altura da Base (h0):</b> ${h0} cm
        `;
    }

    function gerarPDFSapata() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const d = dadosSapata;

        doc.setFontSize(16);
        doc.text("MEMORIAL DE CÁLCULO: FUNDAÇÃO (SAPATA)", 20, 20);
        
        doc.setFontSize(12);
        doc.text("1. CARGAS CONSIDERADAS", 20, 40);
        doc.setFont("helvetica", "normal");
        doc.text(`- Peso Laje: ${d.pLaje} kgf`, 25, 48);
        doc.text(`- Peso Viga: ${d.pViga} kgf`, 25, 55);
        doc.text(`- Peso Pilar: ${d.pPilar} kgf`, 25, 62);
        doc.text(`- Tensão Admissível do Solo: ${d.sigmaSolo} kgf/cm²`, 25, 69);

        doc.setFont("helvetica", "bold");
        doc.text(`2. DIMENSIONAMENTO GEOMÉTRICO`, 20, 85);
        doc.setFont("helvetica", "normal");
        doc.text(`- Lado X: ${d.lado} cm`, 25, 95);
        doc.text(`- Lado Y: ${d.lado} cm`, 25, 102);
        doc.text(`- Altura Total (Z): ${d.hTotal} cm`, 25, 109);
        doc.text(`- Altura da Base (Aba): ${d.h0} cm`, 25, 116);

        doc.setFont("helvetica", "bold");
        doc.text("3. VERIFICAÇÃO DE ESFORÇOS", 20, 130);
        doc.setFont("helvetica", "normal");
        doc.text(`- Momento X: ${d.mx} kgf.m`, 25, 140);
        doc.text(`- Momento Y: ${d.my} kgf.m`, 25, 147);
        
        doc.save("Memorial_Sapata.pdf");
    }
</script>
</body>
</html>
