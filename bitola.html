<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Elétrico com Condutores - NBR 5410</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            background: #fff;
            margin: 0 auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h2 {
            color: #1e3a8a;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .global-inputs {
            background: #f8fafc;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .circuito-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            margin-bottom: 10px;
            transition: background 0.2s;
        }
        .circuito-row:hover {
            background: #f8fafc;
        }
        .circuito-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .circuito-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .circuito-inputs input {
            width: 90px;
        }
        button {
            width: 100%;
            background-color: #1e3a8a;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        #relatorio {
            margin-top: 25px;
            padding: 20px;
            background: #eff6ff;
            border-left: 5px solid #2563eb;
            border-radius: 4px;
            display: none;
        }
        .card-resultado {
            background: white;
            padding: 12px;
            margin-top: 10px;
            border-radius: 4px;
            border: 1px solid #bfdbfe;
            line-height: 1.6;
        }
        .destaque-tecnico {
            color: #b91c1c;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Dimensionamento de Circuitos e Condutores (NBR 5410)</h2>
    
    <div class="global-inputs">
        <div class="form-group">
            <label for="lampadasExtra">Lâmpadas Adicionais no Total (Quantidade):</label>
            <input type="number" id="lampadasExtra" value="0" min="0">
        </div>
    </div>

    <div id="circuitos-lista">
        <div class="circuito-row">
            <div class="circuito-info">
                <input type="checkbox" id="chk1" checked>
                <label for="chk1">Circuito 1 (Geral/Quartos)</label>
            </div>
            <div class="circuito-inputs">
                <label>Área (m²):</label>
                <input type="number" id="area1" value="12" min="1">
            </div>
        </div>

        <div class="circuito-row">
            <div class="circuito-info">
                <input type="checkbox" id="chk2" checked>
                <label for="chk2">Circuito 2 (Cozinha/Serviço)</label>
            </div>
            <div class="circuito-inputs">
                <label>Área (m²):</label>
                <input type="number" id="area2" value="10" min="1">
            </div>
        </div>

        <div class="circuito-row">
            <div class="circuito-info">
                <input type="checkbox" id="chk3">
                <label for="chk3">Circuito 3 (TUE - Chuveiro)</label>
            </div>
            <div class="circuito-inputs">
                <label>Potência (W):</label>
                <input type="number" id="pot3" value="5500" min="0" step="100">
            </div>
        </div>

        <div class="circuito-row">
            <div class="circuito-info">
                <input type="checkbox" id="chk4">
                <label for="chk4">Circuito 4 (TUE - Lavadora)</label>
            </div>
            <div class="circuito-inputs">
                <label>Potência (W):</label>
                <input type="number" id="pot4" value="2500" min="0" step="100">
            </div>
        </div>

        <div class="circuito-row">
            <div class="circuito-info">
                <input type="checkbox" id="chk5">
                <label for="chk5">Circuito 5 (Ar Condicionado)</label>
            </div>
            <div class="circuito-inputs">
                <label>Potência (W):</label>
                <input type="number" id="pot5" value="1500" min="0" step="100">
            </div>
        </div>
    </div>

    <button onclick="gerarRelatorio()">Gerar Relatório com Condutores</button>

    <div id="relatorio"></div>
</div>

<script>
// Retorna o disjuntor comercial e a seção do cabo correspondente (Método B1 - Cobre - PVC2)
function dimensionarComponentes(corrente, ehExclusivoIluminacao = false) {
    const tabelaDutos = [
        { cabo: 1.5, correnteMax: 17.5, disjuntor: 10 },
        { cabo: 2.5, correnteMax: 24,   disjuntor: 16 }, // ou 20A dependendo do fator de agrupamento
        { cabo: 4.0, correnteMax: 32,   disjuntor: 25 },
        { cabo: 6.0, connectivity: 41,  correnteMax: 41,   disjuntor: 32 },
        { cabo: 10.0,correnteMax: 57,   disjuntor: 40 }, // margem de segurança para chuveiros pesados
        { cabo: 10.0,correnteMax: 57,   disjuntor: 50 },
        { cabo: 16.0,correnteMax: 76,   disjuntor: 63 }
    ];

    // NBR 5410: Seção mínima para tomadas/geral é 2.5mm² mesmo se a corrente for muito baixa
    let secaoMinima = ehExclusivoIluminacao ? 1.5 : 2.5;
    
    let escolha = { cabo: secaoMinima, disjuntor: 10 };

    for (let patamar of tabelaDutos) {
        if (patamar.correnteMax >= corrente) {
            escolha.disjuntor = patamar.disjuntor;
            escolha.cabo = Math.max(patamar.cabo, secaoMinima);
            
            // Ajuste específico para garantir que o disjuntor proteja o cabo
            if (escolha.disjuntor === 10 && !ehExclusivoIluminacao) {
                escolha.disjuntor = 16; // Padrão recomendado para TUGs com cabo 2.5mm²
            }
            break;
        }
    }
    
    // Tratamento para correntes muito altas fora do padrão residencial comum
    if (corrente > 57) {
        escolha.disjuntor = 63;
        escolha.cabo = 16.0;
    }

    return escolha;
}

function gerarRelatorio() {
    const tensao = 220; 
    let cargaTotalW = 0;
    let htmlRelatorio = "<h3>Relatório Técnico de Dimensionamento (Carga e Condutores)</h3>";
    
    const lampadasExtra = parseInt(document.getElementById('lampadasExtra').value) || 0;
    const cargaLampadasExtra = lampadasExtra * 60; 
    
    // --- CIRCUITO 1 (Uso Geral) ---
    if(document.getElementById('chk1').checked) {
        let area = parseFloat(document.getElementById('area1').value) || 0;
        let numTomadas = Math.ceil(Math.sqrt(area) * 4 / 5) || 3; 
        let potTomadas = numTomadas * 100;
        let potIluminacao = area <= 6 ? 100 : 100 + (Math.floor((area - 6) / 4) * 60);
        let cargaCircuito = potTomadas + potIluminacao;
        
        cargaTotalW += cargaCircuito;
        let corrente = cargaCircuito / tensao;
        let dim = dimensionarComponentes(corrente, false);

        htmlRelatorio += `
            <div class="card-resultado">
                <strong>Circuito 1 (Geral/Quartos):</strong><br>
                Tomadas estimadas: ${numTomadas} (${potTomadas}W) | Iluminação base: ${potIluminacao}W<br>
                Carga: ${cargaCircuito}W | Corrente: ${corrente.toFixed(2)}A<br>
                <span class="destaque-tecnico">Disjuntor Sugerido: ${dim.disjuntor}A | Seção do Cabo: ${dim.cabo.toFixed(1)} mm²</span>
            </div>`;
    }

    // --- CIRCUITO 2 (Cozinha/Área de Serviço Geral) ---
    if(document.getElementById('chk2').checked) {
        let area = parseFloat(document.getElementById('area2').value) || 0;
        let numTomadas = Math.ceil(Math.sqrt(area) * 4 / 3.5) || 4; 
        let potTomadas = (Math.min(numTomadas, 3) * 600) + (Math.max(0, numTomadas - 3) * 100);
        let potIluminacao = area <= 6 ? 100 : 100 + (Math.floor((area - 6) / 4) * 60);
        let cargaCircuito = potTomadas + potIluminacao;
        
        cargaTotalW += cargaCircuito;
        let corrente = cargaCircuito / tensao;
        let dim = dimensionarComponentes(corrente, false);

        htmlRelatorio += `
            <div class="card-resultado">
                <strong>Circuito 2 (Cozinha/Serviço Geral):</strong><br>
                Tomadas estimadas: ${numTomadas} (${potTomadas}W) | Iluminação base: ${potIluminacao}W<br>
                Carga: ${cargaCircuito}W | Corrente: ${corrente.toFixed(2)}A<br>
                <span class="destaque-tecnico">Disjuntor Sugerido: ${dim.disjuntor}A | Seção do Cabo: ${dim.cabo.toFixed(1)} mm²</span>
            </div>`;
    }

    // --- CIRCUITOS ESPECIAIS (3, 4 e 5) ---
    for(let i = 3; i <= 5; i++) {
        if(document.getElementById(`chk${i}`).checked) {
            let nomeCkt = i === 3 ? "Circuito 3 (Chuveiro)" : i === 4 ? "Circuito 4 (Lavadora TUE)" : "Circuito 5 (Ar Condicionado)";
            let pot = parseFloat(document.getElementById(`pot${i}`).value) || 0;
            
            cargaTotalW += pot;
            let corrente = pot / tensao;
            
            // Customização para o chuveiro elétrico comum não cair na margem limite
            let dim = dimensionarComponentes(corrente, false);
            if (i === 3 && pot >= 5500 && dim.cabo < 4.0) {
                dim.cabo = 4.0;
                dim.disjuntor = 25;
            }
            if (i === 3 && pot > 6000) {
                dim.cabo = 6.0;
                dim.disjuntor = 32;
            }

            htmlRelatorio += `
                <div class="card-resultado">
                    <strong>${nomeCkt}:</strong><br>
                    Circuito de Uso Especial (TUE) dedicado.<br>
                    Carga: ${pot}W | Corrente: ${corrente.toFixed(2)}A<br>
                    <span class="destaque-tecnico">Disjuntor Sugerido: ${dim.disjuntor}A | Seção do Cabo: ${dim.cabo.toFixed(1)} mm²</span>
                </div>`;
        }
    }

    if (lampadasExtra > 0) {
        cargaTotalW += cargaLampadasExtra;
        htmlRelatorio += `<p style="margin-top:15px;">• Adicionado <strong>${cargaLampadasExtra}W</strong> ao total geral referente às ${lampadasExtra} lâmpadas extras.</p>`;
    }

    htmlRelatorio += `
        <hr style="border: 0; border-top: 1px solid #cbd5e1; margin: 15px 0;">
        <p><strong>Carga Total Instalada:</strong> ${cargaTotalW} W (${(cargaTotalW/1000).toFixed(2)} kW)</p>
        <p style="font-size: 11px; color: #64748b; line-height: 1.4;">Nota de Coordenação (Critério da NBR 5410): O disjuntor sugerido foi casado para proteger o cabo contra sobrecarga ($I_{calculada} \leq I_{disjuntor} \leq I_{max\_cabo}$). Foram consideradas instalações em eletrodutos embutidos em paredes isolantes térmicas/alvenaria.</p>
    `;

    const divRelatorio = document.getElementById('relatorio');
    divRelatorio.innerHTML = htmlRelatorio;
    divRelatorio.style.display = 'block';
}
</script>

</body>
</html>
