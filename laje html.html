### 1. A Fórmula do Peso Próprio (PP)
O cálculo é o volume da laje multiplicado pelo peso do material:

**Exemplo de 12\text{ m}^2:**
 * **Área:** 12\text{ m}^2 (4\text{ m} \times 3\text{ m})
 * **Espessura (h):** 10\text{ cm} (que deve ser escrita como 0,10\text{ m})
 * **Peso Específico:** 2.500\text{ kgf/m}^3
##
 * **Peso Total:** 3.000\text{ kgf} (O peso de toda a placa de concreto de 12\text{ m}^2).
 * **Carga por Metro Quadrado (kgf/m^2):** Se dividirmos o peso total pela área (3.000 / 12), temos **250\text{ kgf/m}^2**.
Portanto, para uma laje de **10\text{ cm}**, o peso "só da laje" é de **250\text{ kgf/m}^2**.
Se você somar os revestimentos (piso, argamassa e contrapiso), que costumam pesar uns 100\text{ kgf/m}^2, chegamos naquele valor de **350\text{ kgf/m}^2** que usamos no seu código como **Carga Permanente**.
### Resumo para não esquecer:
 * Cada **1 cm** de espessura de uma laje maciça pesa **25\text{ kgf}** em cada metro quadrado.
