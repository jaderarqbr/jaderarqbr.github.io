<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Dimensionamento Técnico - NBR</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #0284c7;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #334155;
            --border: #cbd5e1;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 8px;
            border-bottom: 3px solid var(--secondary);
            padding-bottom: 10px;
        }
        p.subtitle {
            color: #64748b;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }
        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            background-color: #fff;
        }
        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #111827;
        }
        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-left: 4px solid var(--secondary);
            background-color: #f0fdf4;
            border-radius: 4px;
            display: none;
        }
        .result-box h3 {
            color: var(--primary);
            margin-bottom: 10px;
        }
        .result-text {
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora de Dimensionamento Técnico</h1>
    <p class="subtitle">Análise de larguras mínimas baseada nas normas NBR 9050, NBR 9077 e NBR 15575.</p>
    
    <div class="form-group">
        <label for="tipoCirculacao">Tipo de Circulação / Elemento:</label>
        <select id="tipoCirculacao">
            <option value="rampa">Rampa (Acessibilidade - NBR 9050)</option>
            <option value="escada">Escada Coletiva (NBR 9050 / NBR 9077)</option>
            <option value="emergencia">Saída de Emergência / Corredor Comercial (NBR 9077)</option>
            <option value="residencial">Corredor Residencial (NBR 15575)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="fluxoPessoas">Fluxo / População Prevista (nº de pessoas):</label>
        <input type="number" id="fluxoPessoas" min="1" value="50">
    </div>

    <button onclick="calcularDimensionamento()">Calcular e Gerar Diagnóstico</button>

    <div id="resultado" class="result-box">
        <h3>Diagnóstico Técnico de Dimensionamento</h3>
        <div id="resultadoTexto" class="result-text"></div>
    </div>
</div>

<script>
function calcularDimensionamento() {
    const tipo = document.getElementById('tipoCirculacao').value;
    const fluxo = parseInt(document.getElementById('fluxoPessoas').value) || 0;
    const resultBox = document.getElementById('resultado');
    const resultTexto = document.getElementById('resultadoTexto');
    
    if (fluxo <= 0) {
        alert('Por favor, insira um fluxo válido maior que zero.');
        return;
    }

    let textoHtml = '';
    
    if (tipo === 'rampa') {
        let larguraBase = 1.20;
        let obs = '';
        if (fluxo > 100) {
            larguraBase = 1.50;
            obs = ' Devido ao fluxo elevado, recomenda-se a largura de 1,50m para permitir o fluxo simultâneo em ambos os sentidos e cruzamento de cadeiras de rodas.';
        }
        textoHtml = `<strong>Norma Reguladora:</strong> NBR 9050<br>
                     <strong>Fluxo Informado:</strong> ${fluxo} pessoas.<br>
                     <strong>Largura Mínima Exigida:</strong> ${larguraBase.toFixed(2)} m.<br>
                     <strong>Parâmetros Técnicos:</strong> Inclinação máxima de 8,33% (1:12). Patamares de descanso obrigatórios a cada 15m de projeção para essa inclinação.${obs}`;
                     
    } else if (tipo === 'escada') {
        let up = Math.ceil(fluxo / 60); // NBR 9077 - Escadas: 60 pessoas por UP
        if (up < 2) up = 2; 
        let largura = up * 0.55;
        if (largura < 1.20) largura = 1.20; // NBR 9050 exige mínimo 1.20m para circulação comum
        
        textoHtml = `<strong>Normas Reguladoras:</strong> NBR 9077 e NBR 9050<br>
                     <strong>Fluxo Informado:</strong> ${fluxo} pessoas.<br>
                     <strong>Unidades de Passagem calculadas:</strong> ${up} UP(s).<br>
                     <strong>Largura Mínima Exigida:</strong> ${largura.toFixed(2)} m.<br>
                     <strong>Fórmula de Dimensionamento:</strong> N = P / C (Onde Capacidade C = 60 pessoas/UP). Degraus calculados pela Fórmula de Blondel: 63cm ≤ (2h + b) ≤ 65cm.`;
                     
    } else if (tipo === 'emergencia') {
        let up = Math.ceil(fluxo / 100); // NBR 9077 - Circulação Horizontal: 100 pessoas por UP
        if (up < 2) up = 2;
        let largura = up * 0.55;
        
        textoHtml = `<strong>Norma Reguladora:</strong> NBR 9077 (Saídas de Emergência)<br>
                     <strong>Fluxo Informado:</strong> ${fluxo} pessoas.<br>
                     <strong>Unidades de Passagem calculadas:</strong> ${up} UP(s).<br>
                     <strong>Largura Mínima Exigida:</strong> ${largura.toFixed(2)} m.<br>
                     <strong>Diretrizes:</strong> Portas ao longo da rota de fuga não podem reduzir a largura útil da circulação e devem abrir no sentido de evacuação se o fluxo do setor ultrapassar 50 pessoas.`;
                     
    } else if (tipo === 'residencial') {
        let largura = 0.90;
        let obs = 'Uso privativo interno da unidade habitacional (corredores internos).';
        if (fluxo > 20) { 
            largura = 1.20;
            obs = 'Área de circulação comum coletiva do edifício residencial (hall de pavimentos).';
        }
        textoHtml = `<strong>Norma Reguladora:</strong> NBR 15575 (Desempenho de Edificações Habitacionais)<br>
                     <strong>Fluxo Indicado:</strong> ${fluxo} pessoas estimadas no pavimento.<br>
                     <strong>Largura Mínima Recomendada:</strong> ${largura.toFixed(2)} m.<br>
                     <strong>Diretrizes:</strong> Atende aos requisitos ergonômicos e antropométricos básicos de habitabilidade e transporte de mobiliário. ${obs}`;
    }

    resultTexto.innerHTML = textoHtml;
    resultBox.style.display = 'block';
}
</script>
</body>
</html>
