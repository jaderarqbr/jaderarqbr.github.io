<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Gematria Hebraica</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1d1d22;
            --primary: #9d4edf;
            --primary-hover: #b476ef;
            --text-main: #e1e1e6;
            --text-muted: #8d8d99;
            --accent: #00b37e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .container { background-color: var(--card-bg); padding: 30px; border-radius: 12px; width: 100%; max-width: 650px; border: 1px solid #29292e; }

        h1 { text-align: center; margin-bottom: 20px; color: #fff; }

        .input-group { margin-bottom: 20px; }

        input[type="text"] { width: 100%; padding: 14px; border-radius: 6px; border: 2px solid #29292e; background-color: #121214; color: #fff; font-size: 20px; text-align: right; }

        .keyboard { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 25px; }

        .key { background-color: #29292e; border: none; color: #fff; padding: 10px; border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .key:hover { background-color: var(--primary); }
        .key .hebrew { font-size: 18px; font-weight: bold; }
        .key .latin { font-size: 10px; color: var(--text-muted); }
        .key .val { font-size: 9px; color: var(--accent); }

        .result-panel { background-color: #121214; padding: 20px; border-radius: 8px; text-align: center; }
        .total-score { font-size: 40px; font-weight: bold; color: var(--accent); }
        .breakdown { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; }
        .letter-card { background: #29292e; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora de Gematria</h1>
    <div class="input-group">
        <input type="text" id="gematria-input" placeholder="נרון קיסר" dir="rtl">
    </div>

    <div class="keyboard" id="keyboard"></div>

    <div class="result-panel">
        <div class="total-score" id="total-score">0</div>
        <div class="breakdown" id="breakdown">Nenhum caractere detectado.</div>
    </div>
</div>

<script>
    const gematriaData = [
        {h: 'א', l: 'A', v: 1}, {h: 'ב', l: 'B/V', v: 2}, {h: 'ג', l: 'G', v: 3}, {h: 'ד', l: 'D', v: 4},
        {h: 'ה', l: 'H', v: 5}, {h: 'ו', l: 'V/U', v: 6}, {h: 'ז', l: 'Z', v: 7}, {h: 'ח', l: 'CH', v: 8},
        {h: 'ט', l: 'T', v: 9}, {h: 'י', l: 'Y/I', v: 10}, {h: 'כ', l: 'K/CH', v: 20}, {h: 'ל', l: 'L', v: 30},
        {h: 'מ', l: 'M', v: 40}, {h: 'נ', l: 'N', v: 50}, {h: 'ס', l: 'S', v: 60}, {h: 'ע', l: 'GN', v: 70},
        {h: 'פ', l: 'P/F', v: 80}, {h: 'צ', l: 'TS', v: 90}, {h: 'ק', l: 'Q/K', v: 100}, {h: 'ר', l: 'R', v: 200},
        {h: 'ש', l: 'SH', v: 300}, {h: 'ת', l: 'T', v: 400}
    ];

    const input = document.getElementById('gematria-input');
    const keyboard = document.getElementById('keyboard');
    const totalDisplay = document.getElementById('total-score');
    const breakdown = document.getElementById('breakdown');

    gematriaData.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'key';
        btn.innerHTML = `<span class="hebrew">${item.h}</span><span class="latin">${item.l}</span><span class="val">${item.v}</span>`;
        btn.onclick = () => { input.value += item.h; calcular(); };
        keyboard.appendChild(btn);
    });

    function calcular() {
        let total = 0;
        let html = '';
        Array.from(input.value).forEach(char => {
            const match = gematriaData.find(i => i.h === char);
            if(match) {
                total += match.v;
                html += `<div class="letter-card">${char} <sub>${match.v}</sub></div>`;
            }
        });
        totalDisplay.innerText = total;
        breakdown.innerHTML = html || 'Insira letras hebraicas...';
    }

    input.oninput = calcular;
</script>
</body>
</html>
