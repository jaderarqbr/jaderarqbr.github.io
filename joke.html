<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .joke-box {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 25px;
            margin: 20px 0;
            border-radius: 8px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .setup {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .punchline {
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
            font-style: italic;
        }

        .loading {
            color: #667eea;
            font-size: 1.1em;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .api-selector {
            margin: 20px 0;
        }

        .api-selector label {
            display: inline-block;
            margin: 0 15px;
            font-size: 1em;
        }

        .api-selector input[type="radio"] {
            margin-right: 5px;
            cursor: pointer;
        }

        .error {
            color: #e74c3c;
            padding: 15px;
            background: #fadbd8;
            border-radius: 8px;
            margin: 20px 0;
        }

        footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>

        <div class="api-selector">
            <label>
                <input type="radio" name="api" value="official" checked> Official Joke API
            </label>
            <label>
                <input type="radio" name="api" value="jokeapi"> JokeAPI
            </label>
            <label>
                <input type="radio" name="api" value="dadjoke"> Dad Jokes
            </label>
        </div>

        <div id="jokeContainer" class="joke-box" style="display: none;"></div>
        <div id="loadingMessage" class="loading" style="display: none;">Loading a joke...</div>
        <div id="errorMessage" class="error" style="display: none;"></div>

        <button onclick="getJoke()">Get a Joke 🎭</button>
        <button onclick="copyJoke()" id="copyBtn" style="display: none;">Copy Joke 📋</button>

        <footer>
            <p>Powered by free joke APIs</p>
        </footer>
    </div>

    <script>
        let currentJoke = '';

        async function getJoke() {
            const selectedApi = document.querySelector('input[name="api"]:checked').value;
            const container = document.getElementById('jokeContainer');
            const loading = document.getElementById('loadingMessage');
            const error = document.getElementById('errorMessage');
            const copyBtn = document.getElementById('copyBtn');

            // Reset UI
            container.style.display = 'none';
            error.style.display = 'none';
            loading.style.display = 'flex';
            copyBtn.style.display = 'none';

            try {
                let joke = {};

                if (selectedApi === 'official') {
                    const response = await fetch('https://official-joke-api.appspot.com/random_joke');
                    joke = await response.json();
                    currentJoke = `${joke.setup}\n\n${joke.punchline}`;
                    displayJoke(joke.setup, joke.punchline);
                } else if (selectedApi === 'jokeapi') {
                    const response = await fetch('https://v2.jokeapi.dev/joke/Any');
                    joke = await response.json();
                    if (joke.type === 'single') {
                        currentJoke = joke.joke;
                        displayJoke('', joke.joke);
                    } else {
                        currentJoke = `${joke.setup}\n\n${joke.delivery}`;
                        displayJoke(joke.setup, joke.delivery);
                    }
                } else if (selectedApi === 'dadjoke') {
                    const response = await fetch('https://icanhazdadjoke.com/', {
                        headers: { 'Accept': 'application/json' }
                    });
                    joke = await response.json();
                    currentJoke = joke.joke;
                    displayJoke('', joke.joke);
                }

                loading.style.display = 'none';
                copyBtn.style.display = 'inline-block';
            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.innerHTML = `<strong>Oops!</strong> Failed to fetch a joke. Please try again. Error: ${err.message}`;
                console.error('Fetch error:', err);
            }
        }

        function displayJoke(setup, punchline) {
            const container = document.getElementById('jokeContainer');
            if (setup) {
                container.innerHTML = `<div class="setup">${setup}</div><div class="punchline">${punchline}</div>`;
            } else {
                container.innerHTML = `<div class="punchline">${punchline}</div>`;
            }
            container.style.display = 'flex';
        }

        function copyJoke() {
            navigator.clipboard.writeText(currentJoke).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied! ✓';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            });
        }

        // Load a joke on page load
        window.addEventListener('load', getJoke);

        // Allow Enter key to fetch a joke
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getJoke();
        });
    </script>
</body>
</html>
