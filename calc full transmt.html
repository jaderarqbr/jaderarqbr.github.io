<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador Térmico NBR 15220 - Profissional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --danger: #c0392b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 15px; color: #333; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1200px; margin: auto; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex: 1; min-width: 350px; }
        h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 1.2rem; }
        
        .layer-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        .btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .btn-add { background: var(--primary); }
        .btn-calc { background: var(--secondary); }
        .btn-pdf { background: var(--danger); }
        
        .result-box { margin-top: 20px; padding: 15px; background: #e8f4fd; border-radius: 8px; border-left: 5px solid #2980b9; line-height: 1.5; }
        canvas { background: white; border: 1px solid #2c3e50; width: 100%; height: auto; border-radius: 4px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }

        @media (max-width: 600px) {
            .panel { min-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h3>Composição da Parede</h3>
        <div id="layers-container">
            </div>
        <button class="btn btn-add" onclick="addLayer()">+ Adicionar Material</button>
        
        <div style="margin-top:20px;">
            <label>Cor da Pintura Externa:</label>
            <input type="color" id="wallColor" value="#E0E0E0" onchange="calculate()" style="width:100%; height:40px;">
        </div>
        
        <div class="result-box" id="results">Preencha os dados e clique em calcular.</div>
        
        <button class="btn btn-calc" onclick="calculate()">ATUALIZAR CÁLCULO</button>
        <button class="btn btn-pdf" onclick="exportPDF()">EXPORTAR RELATÓRIO PDF</button>
    </div>

    <div class="panel">
        <h3>Corte Técnico e Legenda</h3>
        <canvas id="wallCanvas" width="600" height="550"></canvas>
    </div>
</div>

<script>
    // Parâmetros NBR 15220-2 (Lambda em W/m.K)
    const materials = {
        "reboco": { lambda: 1.15, hatch: "branco", desc: "Argamassa Reboco" },
        "emboço": { lambda: 1.15, hatch: "pontinhos", desc: "Argamassa Emboço" },
        "chapisco": { lambda: 1.15, hatch: "pontinhos", desc: "Chapisco" },
        "tijolo": { lambda: 0.90, hatch: "45deg", desc: "Tijolo Cerâmico" },
        "concreto": { lambda: 1.75, hatch: "cruzada", desc: "Concreto Armado" },
        "madeira": { lambda: 0.15, hatch: "horizontal", desc: "Madeira Média" },
        "la_vidro": { lambda: 0.045, hatch: "vertical", desc: "Lã de Vidro" },
        "la_fibra": { lambda: 0.040, hatch: "bolhas", desc: "Lã de Fibra/Bubble" },
        "isopor": { lambda: 0.04, hatch: "preto", desc: "EPS (Isopor)" },
        "vazio": { lambda: 0.17, hatch: "branco", desc: "Câmara de Ar" }
    };

    function addLayer() {
        const container = document.getElementById('layers-container');
        const div = document.createElement('div');
        div.className = 'layer-row';
        div.innerHTML = `
            <select class="mat-select" style="flex:2">
                ${Object.keys(materials).map(m => `<option value="${m}">${m.toUpperCase()}</option>`).join('')}
            </select>
            <input type="number" class="mat-thick" value="20" style="width:60px">
            <span style="font-size:12px; font-weight:bold;">mm</span>
            <button onclick="this.parentElement.remove(); calculate()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold; padding:5px;">✕</button>
        `;
        container.appendChild(div);
    }

    function drawHatch(ctx, hatchType, x, y, w, h) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(x, y, w, h);
        ctx.clip();
        ctx.strokeStyle = "#555";
        ctx.lineWidth = 0.6;

        if (hatchType === "horizontal") {
            for(let i=y; i<y+h; i+=5) { ctx.moveTo(x, i); ctx.lineTo(x+w, i); }
        } else if (hatchType === "vertical") {
            for(let i=x; i<x+w; i+=5) { ctx.moveTo(i, y); ctx.lineTo(i, y+h); }
        } else if (hatchType === "45deg") {
            for(let i=-h; i<w; i+=8) { ctx.moveTo(x+i, y); ctx.lineTo(x+i+h, y+h); }
        } else if (hatchType === "cruzada") {
            for(let i=-h; i<w; i+=10) { 
                ctx.moveTo(x+i, y); ctx.lineTo(x+i+h, y+h); 
                ctx.moveTo(x+i+h, y); ctx.lineTo(x+i, y+h); 
            }
        } else if (hatchType === "pontinhos") {
            for(let i=2; i<w; i+=4) { for(let j=2; j<h; j+=4) { ctx.fillRect(x+i, y+j, 1, 1); } }
        } else if (hatchType === "bolhas") {
            for(let i=4; i<w; i+=10) { 
                for(let j=4; j<h; j+=10) { 
                    ctx.beginPath(); ctx.arc(x+i, y+j, 3.5, 0, Math.PI*2); ctx.stroke(); 
                } 
            }
        } else if (hatchType === "preto") {
            ctx.fillStyle = "#444"; ctx.fillRect(x,y,w,h);
        }
        
        ctx.stroke();
        ctx.restore();
    }

    let reportData = {};

    function calculate() {
        const canvas = document.getElementById('wallCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const layerDivs = document.querySelectorAll('.layer-row');
        let totalR = 0.17; // Rsi (0.13) + Rse (0.04)
        let currentX = 60;
        let layers = [];

        layerDivs.forEach((row) => {
            const key = row.querySelector('.mat-select').value;
            const thickMm = parseFloat(row.querySelector('.mat-thick').value);
            const mat = materials[key];
            const thickM = thickMm / 1000;
            const R = thickM / mat.lambda;
            totalR += R;
            
            layers.push({ ...mat, thick: thickMm, R: R.toFixed(4) });

            const drawW = Math.max(thickMm * 1.5, 12);
            
            // Desenho da Camada
            ctx.strokeStyle = "#2c3e50";
            ctx.lineWidth = 1.5;
            ctx.strokeRect(currentX, 50, drawW, 250);
            drawHatch(ctx, mat.hatch, currentX, 50, drawW, 250);
            
            // --- CORREÇÃO: COTA NA VERTICAL ---
            ctx.save();
            ctx.fillStyle = "#000";
            ctx.font = "bold 11px Arial";
            ctx.translate(currentX + (drawW / 2) + 4, 310);
            ctx.rotate(Math.PI / 2); // Rotaciona 90 graus
            ctx.fillText(`${thickMm}mm`, 0, 0);
            ctx.restore();
            
            currentX += drawW;
        });

        // Desenhar Legenda no Canvas
        let legY = 380;
        ctx.fillStyle = "#2c3e50";
        ctx.font = "bold 13px Arial";
        ctx.fillText("LEGENDA DE MATERIAIS:", 60, legY);
        legY += 25;

        layers.forEach((l, i) => {
            let col = i % 2 === 0 ? 60 : 320;
            ctx.strokeRect(col, legY, 20, 20);
            drawHatch(ctx, l.hatch, col, legY, 20, 20);
            ctx.fillStyle = "#333";
            ctx.font = "12px Arial";
            ctx.fillText(l.desc, col + 30, legY + 15);
            if (i % 2 !== 0) legY += 30;
        });

        const U = (1 / totalR).toFixed(3);
        const color = document.getElementById('wallColor').value;
        const abs = (0.9 - (parseInt(color.substring(1,3), 16) / 255) * 0.6).toFixed(2);

        reportData = { U, abs, totalR: totalR.toFixed(4), layers, color };

        document.getElementById('results').innerHTML = `
            <strong>Transmitância (U):</strong> ${U} W/(m².K)<br>
            <strong>Absortância Solar (α):</strong> ${abs}<br>
            <strong>Resistência Total (Rt):</strong> ${totalR.toFixed(4)} m².K/W
        `;
    }

    async function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFont("helvetica", "bold");
        doc.setFontSize(16);
        doc.text("MEMÓRIA DE CÁLCULO TÉRMICO (NBR 15220)", 20, 20);
        
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text(`Local: Fortaleza - CE | Data: ${new Date().toLocaleDateString()}`, 20, 28);
        doc.line(20, 32, 190, 32);

        doc.setFont("helvetica", "bold");
        doc.text("1. EQUAÇÕES BASE", 20, 42);
        doc.setFont("courier", "normal");
        doc.text("Rt = Rsi + (e1/L1 + e2/L2 + ...) + Rse", 25, 50);
        doc.text("U = 1 / Rt", 25, 57);

        doc.setFont("helvetica", "bold");
        doc.text("2. DISCRIMINAÇÃO DAS CAMADAS", 20, 72);
        doc.setFont("helvetica", "normal");
        let y = 80;
        doc.text("Material | Espessura (mm) | Lambda | Resistência (m²K/W)", 20, y);
        doc.line(20, y+2, 190, y+2);
        y += 10;

        reportData.layers.forEach((l) => {
            doc.text(`${l.desc} | ${l.thick}mm | ${l.lambda} | ${l.R}`, 20, y);
            y += 8;
        });
        doc.text("Resistências Superficiais (Ar) | - | - | 0.1700", 20, y);
        
        y += 15;
        doc.setFillColor(240, 240, 240);
        doc.rect(20, y, 170, 22, 'F');
        doc.setFont("helvetica", "bold");
        doc.text(`RESISTÊNCIA TOTAL (Rt): ${reportData.totalR} m²K/W`, 25, y + 8);
        doc.text(`TRANSMITÂNCIA TÉRMICA (U): ${reportData.U} W/(m².K)`, 25, y + 16);

        // Segunda Página com o Desenho
        doc.addPage();
        doc.text("3. DETALHAMENTO GRÁFICO (CORTE)", 20, 20);
        const imgData = document.getElementById('wallCanvas').toDataURL('image/png');
        doc.addImage(imgData, 'PNG', 15, 30, 180, 165);

        doc.save("Relatorio_Termico_NBR.pdf");
    }

    // Iniciar com 3 camadas padrão
    addLayer(); addLayer(); addLayer();
    calculate();
</script>

</body>
</html>
