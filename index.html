<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diretório - jaderarqbr.github.io</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .file-list {
            list-style: none;
            padding: 0;
        }
        .file-list li {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .file-list li:last-child {
            border-bottom: none;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .folder-icon::before {
            content: "📁 ";
        }
        .size {
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Index of /</h1>
        <p>Bem-vindo ao meu GitHub Pages!</p>
        
        <ul class="file-list">
            <li><a href="../" class="folder-icon">Parent Directory</a></li>
            <li><a href="https://jaderarqbr.github.io/Gurpfull/">Ficha Gurp Full</a> <span class="size">- Gerenciamento e Log</span></li>
            <li><a href="https://jaderarqbr.github.io/Chaturanga4d/">Projeto Chturanga</a> <span class="size">- Projeto de tabuleiro 4d</span></li>
            <li><a href="./portfolio/">Portfolio</a> <span class="size">- Meu trabalho</span></li>
            <li><a href="./docs/">Documentação</a> <span class="size">- Documentos</span></li>
        </ul>
    </div>
</body>
</html>
