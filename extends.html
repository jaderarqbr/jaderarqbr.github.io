        </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        const sizeSlider = document.getElementById('size-slider');
        const sizeVal = document.getElementById('size-val');
        const colorPicker = document.getElementById('color-picker');
        const toolNameLabel = document.getElementById('tool-name');
        const fileInput = document.getElementById('file-input');
        
        const selectionBox = document.getElementById('selection-box');
        const handles = {
            tl: document.getElementById('handle-tl'),
            tr: document.getElementById('handle-tr'),
            bl: document.getElementById('handle-bl'),
            br: document.getElementById('handle-br')
        };

        let tool = 'pencil';
        let drawing = false;
        let startX, startY;
        let selectionRect = { x: 0, y: 0, w: 0, h: 0, active: false };
        let selectedCanvas = null; // Usado para guardar a imagem "flutuante" durante a transformação
        let isResizing = false;
        let currentHandle = null;

        function initCanvas() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width * 0.95;
            canvas.height = rect.height * 0.95;
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        window.onload = initCanvas;

        // --- FUNCIONALIDADE ABRIR ---
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // Limpar tela antes de abrir
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // Calcular escala proporcional
                    const ratio = Math.min(canvas.width / img.width, canvas.height / img.height);
                    const nw = img.width * ratio;
                    const nh = img.height * ratio;
                    const nx = (canvas.width - nw) / 2;
                    const ny = (canvas.height - nh) / 2;

                    ctx.drawImage(img, nx, ny, nw, nh);
                    
                    // Resetar ferramenta para lápis após abrir
                    setTool('pencil', document.getElementById('btn-pencil'));
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // --- TROCA DE FERRAMENTAS ---
        function setTool(newTool, btn) {
            if (tool === 'select') hideSelection();
            tool = newTool;
            document.querySelectorAll('header button, header label').forEach(b => b.classList.remove('tool-active'));
            if(btn) btn.classList.add('tool-active');
            toolNameLabel.innerText = newTool.toUpperCase();
        }

        document.getElementById('btn-pencil').onclick = (e) => setTool('pencil', e.currentTarget);
        document.getElementById('btn-eraser').onclick = (e) => setTool('eraser', e.currentTarget);
        document.getElementById('btn-select').onclick = (e) => setTool('select', e.currentTarget);
        document.getElementById('btn-picker').onclick = (e) => setTool('picker', e.currentTarget);
        document.getElementById('btn-clear').onclick = () => {
            if(confirm("Deseja apagar tudo?")) {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                hideSelection();
            }
        };

        sizeSlider.oninput = (e) => { sizeVal.innerText = e.target.value; };

        // --- GESTOS E DESENHO ---
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener('mousedown', onStart);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); });
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', (e) => { onMove(e); });
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);

        function onStart(e) {
            const pos = getPos(e);
            startX = pos.x;
            startY = pos.y;

            if (tool === 'pencil' || tool === 'eraser') {
                drawing = true;
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            } else if (tool === 'picker') {
                const pixel = ctx.getImageData(pos.x, pos.y, 1, 1).data;
                colorPicker.value = "#" + ((1 << 24) + (pixel[0] << 16) + (pixel[1] << 8) + pixel[2]).toString(16).slice(1);
                setTool('pencil', document.getElementById('btn-pencil'));
            } else if (tool === 'select' && !selectedCanvas) {
                selectionRect.active = true;
                selectionRect.x = pos.x;
                selectionRect.y = pos.y;
                selectionRect.w = 0;
                selectionRect.h = 0;
            }
        }

        function onMove(e) {
            const pos = getPos(e);
            if (drawing) {
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = sizeSlider.value;
                ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : colorPicker.value;
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            } else if (tool === 'select' && selectionRect.active && !selectedCanvas) {
                selectionRect.w = pos.x - startX;
                selectionRect.h = pos.y - startY;
                renderSelectionUI();
            } else if (isResizing) {
                doResize(pos.x, pos.y);
            }
        }

        function onEnd() {
            if (drawing) {
                drawing = false;
            } else if (tool === 'select' && selectionRect.active && !selectedCanvas) {
                if (Math.abs(selectionRect.w) > 5) {
                    captureImage();
                } else {
                    hideSelection();
                }
            }
            isResizing = false;
        }

        // --- SISTEMA DE TRANSFORMAÇÃO ---
        function renderSelectionUI() {
            const canvasRect = canvas.getBoundingClientRect();
            selectionBox.style.display = 'block';
            const rx = selectionRect.w < 0 ? selectionRect.x + selectionRect.w : selectionRect.x;
            const ry = selectionRect.h < 0 ? selectionRect.y + selectionRect.h : selectionRect.y;
            const rw = Math.abs(selectionRect.w);
            const rh = Math.abs(selectionRect.h);

            selectionBox.style.left = (canvasRect.left + rx) + 'px';
            selectionBox.style.top = (canvasRect.top + ry) + 'px';
            selectionBox.style.width = rw + 'px';
            selectionBox.style.height = rh + 'px';
            
            if(selectedCanvas) {
                updateHandles();
            }
        }

        function captureImage() {
            // Normalizar retangulo
            if(selectionRect.w < 0) { selectionRect.x += selectionRect.w; selectionRect.w = Math.abs(selectionRect.w); }
            if(selectionRect.h < 0) { selectionRect.y += selectionRect.h; selectionRect.h = Math.abs(selectionRect.h); }

            // Guardar imagem num canvas temporário
            selectedCanvas = document.createElement('canvas');
            selectedCanvas.width = selectionRect.w;
            selectedCanvas.height = selectionRect.h;
            selectedCanvas.getContext('2d').drawImage(canvas, selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h, 0, 0, selectionRect.w, selectionRect.h);

            // Limpar fundo no canvas principal
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
            
            Object.values(handles).forEach(h => h.style.display = 'block');
            updateHandles();
        }

        function updateHandles() {
            const canvasRect = canvas.getBoundingClientRect();
            const { x, y, w, h } = selectionRect;
            const offset = 12; // Metade do tamanho do handle

            const positions = {
                tl: [x, y],
                tr: [x + w, y],
                bl: [x, y + h],
                br: [x + w, y + h]
            };

            for (let id in positions) {
                handles[id].style.left = (canvasRect.left + positions[id][0] - offset) + 'px';
                handles[id].style.top = (canvasRect.top + positions[id][1] - offset) + 'px';
            }
        }

        function hideSelection() {
            if (selectedCanvas) {
                // Aplica a imagem final antes de sumir
                ctx.drawImage(selectedCanvas, selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h);
            }
            selectedCanvas = null;
            selectionRect.active = false;
            selectionBox.style.display = 'none';
            Object.values(handles).forEach(h => h.style.display = 'none');
        }

        // Eventos das Alças
        Object.keys(handles).forEach(key => {
            const handle = handles[key];
            const startResize = (e) => { e.stopPropagation(); isResizing = true; currentHandle = key; };
            handle.addEventListener('mousedown', startResize);
            handle.addEventListener('touchstart', startResize);
        });

        function doResize(nx, ny) {
            const { x, y, w, h } = selectionRect;
            if (currentHandle === 'br') {
                selectionRect.w = nx - x;
                selectionRect.h = ny - y;
            } else if (currentHandle === 'tl') {
                selectionRect.w = x + w - nx;
                selectionRect.h = y + h - ny;
                selectionRect.x = nx;
                selectionRect.y = ny;
            } else if (currentHandle === 'tr') {
                selectionRect.w = nx - x;
                selectionRect.h = y + h - ny;
                selectionRect.y = ny;
            } else if (currentHandle === 'bl') {
                selectionRect.w = x + w - nx;
                selectionRect.h = ny - y;
                selectionRect.x = nx;
            }
            renderSelectionUI();
        }

    </script>
</body>
</html>
