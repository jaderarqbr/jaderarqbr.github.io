```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta Pro - 0 a 100</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }
        .roulette-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 20px auto;
        }
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1);
            box-shadow: 0 0 30px rgba(0,0,0,0.5), 0 0 15px rgba(59, 130, 246, 0.5);
        }
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ef4444;
            z-index: 10;
        }
        .number-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 5px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: #1e293b;
            border-radius: 12px;
        }
        .number-btn {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #334155;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .number-btn.selected {
            background: #3b82f6;
            box-shadow: 0 0 10px #3b82f6;
            transform: scale(1.05);
        }
        .number-btn:active {
            transform: scale(0.9);
        }
        /* Custom Scrollbar */
        .number-grid::-webkit-scrollbar {
            width: 6px;
        }
        .number-grid::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4">

    <!-- Header / Saldo -->
    <div class="flex justify-between items-center bg-slate-800 p-4 rounded-xl mb-6 shadow-lg">
        <div>
            <h1 class="text-xl font-bold text-blue-400">Roleta Mobile</h1>
            <p class="text-xs text-slate-400">Escolha de 0 a 100</p>
        </div>
        <div class="text-right">
            <span class="block text-xs text-slate-400 uppercase font-bold">Saldo</span>
            <span id="balance" class="text-2xl font-mono text-yellow-400">1000</span>
            <span class="text-yellow-400">🪙</span>
        </div>
    </div>

    <!-- Roleta Visual -->
    <div class="roulette-container">
        <div class="pointer"></div>
        <div id="wheel" class="wheel">?</div>
    </div>

    <!-- Painel de Aposta -->
    <div class="bg-slate-800 p-4 rounded-xl shadow-lg mb-6">
        <div class="flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <label class="text-sm font-semibold text-slate-300">Valor da Aposta:</label>
                <div class="flex items-center bg-slate-900 rounded-lg p-1">
                    <button onclick="adjustBet(-10)" class="px-3 py-1 bg-slate-700 rounded-md">-10</button>
                    <input type="number" id="betAmount" value="10" min="1" class="w-16 bg-transparent text-center font-bold focus:outline-none">
                    <button onclick="adjustBet(10)" class="px-3 py-1 bg-slate-700 rounded-md">+10</button>
                </div>
            </div>

            <div class="text-sm text-slate-400 italic" id="selectionStatus">
                Selecione um número abaixo para apostar...
            </div>

            <button id="spinBtn" onclick="play()" class="w-full py-4 bg-green-600 hover:bg-green-500 disabled:bg-slate-600 disabled:opacity-50 text-white font-bold rounded-xl text-lg transition-colors shadow-lg">
                GIRAR ROLETA
            </button>
        </div>
    </div>

    <!-- Grade de Números -->
    <h2 class="text-sm font-bold mb-2 text-slate-400 uppercase px-1">Escolha seu Número</h2>
    <div id="numberGrid" class="number-grid mb-6">
        <!-- Gerado via JS -->
    </div>

    <!-- Histórico -->
    <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
        <h3 class="text-xs font-bold text-slate-500 uppercase mb-2">Últimos Resultados</h3>
        <div id="history" class="flex gap-2 overflow-x-auto pb-2">
            <!-- Gerado via JS -->
        </div>
    </div>

    <!-- Notificação Modal -->
    <div id="msgModal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-50 p-6">
        <div class="bg-slate-800 p-8 rounded-2xl text-center max-w-xs w-full border border-slate-600">
            <div id="modalIcon" class="text-5xl mb-4"></div>
            <h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>
            <p id="modalBody" class="text-slate-400 mb-6"></p>
            <button onclick="closeModal()" class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl">OK</button>
        </div>
    </div>

    <script>
        let balance = 1000;
        let selectedNumber = null;
        let isSpinning = false;

        const wheelEl = document.getElementById('wheel');
        const balanceEl = document.getElementById('balance');
        const betInput = document.getElementById('betAmount');
        const gridEl = document.getElementById('numberGrid');
        const statusEl = document.getElementById('selectionStatus');
        const historyEl = document.getElementById('history');

        // Inicializar Grade de 0 a 100
        function initGrid() {
            for (let i = 0; i <= 100; i++) {
                const btn = document.createElement('div');
                btn.className = 'number-btn';
                btn.innerText = i;
                btn.onclick = () => selectNumber(i, btn);
                gridEl.appendChild(btn);
            }
        }

        function selectNumber(num, element) {
            if (isSpinning) return;
            
            // Remover seleção anterior
            document.querySelectorAll('.number-btn').forEach(b => b.classList.remove('selected'));
            
            selectedNumber = num;
            element.classList.add('selected');
            statusEl.innerHTML = `Apostando no número: <b class="text-blue-400">${num}</b>`;
        }

        function adjustBet(val) {
            let current = parseInt(betInput.value) || 0;
            betInput.value = Math.max(1, current + val);
        }

        function showMessage(title, body, icon) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerText = body;
            document.getElementById('modalIcon').innerText = icon;
            document.getElementById('msgModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('msgModal').classList.add('hidden');
        }

        function addToHistory(num, won) {
            const item = document.createElement('div');
            item.className = `flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center font-bold text-xs ${won ? 'bg-green-600' : 'bg-slate-700'}`;
            item.innerText = num;
            historyEl.prepend(item);
        }

        async function play() {
            const bet = parseInt(betInput.value);

            if (selectedNumber === null) {
                return showMessage("Ops!", "Por favor, escolha um número na tabela antes de girar.", "📍");
            }
            if (bet > balance) {
                return showMessage("Saldo Insuficiente", "Você não tem moedas suficientes para essa aposta.", "💸");
            }
            if (isSpinning) return;

            // Iniciar Jogo
            isSpinning = true;
            balance -= bet;
            updateUI();

            // Efeito visual de girar
            const spins = 5 + Math.floor(Math.random() * 5);
            const finalNum = Math.floor(Math.random() * 101);
            let currentRotation = 0;

            wheelEl.style.transform = `rotate(${360 * spins}deg)`;
            wheelEl.innerText = "?";

            // Timer para o resultado
            setTimeout(() => {
                isSpinning = false;
                wheelEl.style.transition = 'none';
                wheelEl.style.transform = 'rotate(0deg)';
                setTimeout(() => wheelEl.style.transition = 'transform 3s cubic-bezier(0.1, 0, 0.1, 1)', 50);
                
                wheelEl.innerText = finalNum;

                if (finalNum === selectedNumber) {
                    const prize = bet * 100; // Pagamento de 100x para acertar 1 em 101
                    balance += prize;
                    showMessage("GANHOU!", `Parabéns! O número foi ${finalNum}. Você recebeu ${prize} moedas!`, "🎉");
                    addToHistory(finalNum, true);
                } else {
                    addToHistory(finalNum, false);
                    // Feedback visual rápido se perdeu
                    wheelEl.classList.add('text-red-500');
                    setTimeout(() => wheelEl.classList.remove('text-red-500'), 1000);
                }

                updateUI();
            }, 3000);
        }

        function updateUI() {
            balanceEl.innerText = balance;
            document.getElementById('spinBtn').disabled = isSpinning;
        }

        // Bloquear zoom acidental em mobile ao clicar rápido
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        window.onload = initGrid;
    </script>
</body>
</html>
